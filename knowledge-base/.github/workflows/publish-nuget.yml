name: Publish NuGet Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (SemVer). Leave empty to auto-resolve."
        required: false
        type: string
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  NUGET_SOURCE: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

jobs:
  pack-and-publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Resolve package version
        id: version
        shell: pwsh
        run: |
          $version = ./build/resolve-package-version.ps1 `
            -ManualVersion "${{ github.event.inputs.version }}" `
            -GitRef "${{ github.ref }}" `
            -RunNumber ${{ github.run_number }} `
            -NuspecPath "knowledge-base.nuspec"

          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Resolved package version: $version"

      - name: Pack package
        shell: pwsh
        run: |
          ./build/pack-nuget.ps1 -Version "${{ steps.version.outputs.value }}"

      - name: Publish package to GitHub Packages
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./build/publish-nuget-package.ps1 `
            -PackageDirectory "artifacts/nuget" `
            -Source "${{ env.NUGET_SOURCE }}" `
            -ApiKey "$env:GITHUB_TOKEN"
